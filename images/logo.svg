<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" width="400" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c8960c"/>
    </linearGradient>
  </defs>

  <!-- Transparent background — inherits hero colour -->

  <!-- ══ MARK ══ -->

  <!-- Central vertical post -->
  <rect x="64" y="28" width="4" height="90" rx="2" fill="#c8a020"/>

  <!-- Horizontal beam (slightly tilted left-down) -->
  <line x1="18" y1="52" x2="112" y2="48" stroke="#c8a020" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left chain -->
  <line x1="22" y1="52" x2="22" y2="72" stroke="#c8a020" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,2"/>
  <!-- Right chain -->
  <line x1="108" y1="48" x2="108" y2="68" stroke="#c8a020" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,2"/>

  <!-- Left pan -->
  <ellipse cx="22"  cy="73" rx="18" ry="4" fill="none" stroke="#c8a020" stroke-width="2.5"/>
  <!-- Right pan -->
  <ellipse cx="108" cy="69" rx="18" ry="4" fill="none" stroke="#c8a020" stroke-width="2.5"/>

  <!-- Data bars LEFT pan -->
  <rect x="10" y="60" width="5" height="13" rx="1" fill="#f0c040"/>
  <rect x="17" y="63" width="5" height="10" rx="1" fill="#f0c040"/>
  <rect x="24" y="56" width="5" height="17" rx="1" fill="#f0c040"/>
  <rect x="31" y="65" width="5" height="8"  rx="1" fill="#c8960c"/>

  <!-- Data bars RIGHT pan (anomaly red bar) -->
  <rect x="96"  y="56" width="5" height="13" rx="1" fill="#f0c040"/>
  <rect x="103" y="59" width="5" height="10" rx="1" fill="#f0c040"/>
  <rect x="110" y="53" width="5" height="16" rx="1" fill="#e03030"/>
  <rect x="117" y="60" width="5" height="9"  rx="1" fill="#f0c040"/>

  <!-- Post base -->
  <rect x="50" y="115" width="32" height="5" rx="2.5" fill="#c8a020"/>
  <rect x="55" y="112" width="22" height="4" rx="2"   fill="#c8a020"/>

  <!-- ══ WORDMARK ══ -->
  <!-- "Metis" — white, bold, serif -->
  <text x="148" y="68"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-weight="700"
        fill="white"
        letter-spacing="0.5">Metis</text>

  <!-- Subtitle lines — light gold -->
  <text x="148" y="93"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#f0d878" letter-spacing="2.2">SEC EDGAR</text>
  <text x="148" y="112"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#f0d878" letter-spacing="1.8">FRAUD ANALYZER</text>

  <!-- Rule -->
  <line x1="148" y1="120" x2="390" y2="120" stroke="#f0c040" stroke-width="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="148" y="136"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9.5" fill="rgba(255,255,255,0.55)" letter-spacing="2">FINANCIAL FORENSICS  ·  C++20</text>
</svg>
