<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="navyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1b35"/>
    </linearGradient>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="200" height="200" rx="32" fill="url(#navyBg)"/>

  <!-- Central post -->
  <rect x="97" y="28" width="6" height="118" rx="3" fill="#c8a020"/>

  <!-- Beam (slightly tilted) -->
  <line x1="28" y1="70" x2="172" y2="62"
        stroke="#c8a020" stroke-width="5" stroke-linecap="round"/>

  <!-- Left chain -->
  <line x1="34"  y1="70"  x2="34"  y2="100"
        stroke="#c8a020" stroke-width="3" stroke-linecap="round" stroke-dasharray="4,3"/>
  <!-- Right chain -->
  <line x1="166" y1="62"  x2="166" y2="92"
        stroke="#c8a020" stroke-width="3" stroke-linecap="round" stroke-dasharray="4,3"/>

  <!-- Left pan -->
  <ellipse cx="34"  cy="103" rx="28" ry="6"
           fill="none" stroke="#c8a020" stroke-width="3.5"/>
  <!-- Right pan -->
  <ellipse cx="166" cy="95"  rx="28" ry="6"
           fill="none" stroke="#c8a020" stroke-width="3.5"/>

  <!-- Data bars LEFT pan (gold) -->
  <rect x="16"  y="82" width="9" height="21" rx="1.5" fill="#f0c040"/>
  <rect x="28"  y="88" width="9" height="15" rx="1.5" fill="#f0c040"/>
  <rect x="40"  y="76" width="9" height="27" rx="1.5" fill="#f0c040"/>
  <rect x="52"  y="91" width="9" height="12" rx="1.5" fill="#c8960c"/>

  <!-- Data bars RIGHT pan (anomaly = red) -->
  <rect x="148" y="74" width="9" height="21" rx="1.5" fill="#f0c040"/>
  <rect x="160" y="78" width="9" height="17" rx="1.5" fill="#f0c040"/>
  <rect x="172" y="68" width="9" height="27" rx="1.5" fill="#e03030"/>
  <rect x="184" y="80" width="9" height="15" rx="1.5" fill="#f0c040"/>

  <!-- Base -->
  <rect x="78"  y="144" width="44" height="8"  rx="4"   fill="#c8a020"/>
  <rect x="86"  y="138" width="28" height="7"  rx="3.5" fill="#c8a020"/>
</svg>
